          ./utils/register_and_activate_external.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }} -c 0x00641b3671983612e9090c47e49401db25d4753df2dfe3b6d7e2c85527dae85a -n ASSETS -h ${ASSET_MANAGER_COMPONENT_HASH}
          ./utils/register_and_activate_external.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }} -c 0x00641b3671983612e9090c47e49401db25d4753df2dfe3b6d7e2c85527dae85a -n FORCED_REQUESTS -h ${FORCED_REQUESTS_COMPONENT_HASH}

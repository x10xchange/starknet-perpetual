name: Deploy TESTNET

on:
  workflow_dispatch:

jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Install asdf & tools
        uses: asdf-vm/actions/install@v4

      - name: install sncast
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.starkup.sh | sh
      - name: install foundry
        run: |
          asdf install starknet-foundry 0.55.0
          asdf set -u starknet-foundry 0.55.0
          sed -i 's/^starknet-foundry .*/starknet-foundry 0.55.0/' .tool-versions
          cat .tool-versions

      - name: Retrieve account info
        run: |
          echo ${{ secrets.TESTNET_DEPLOYER_ACCOUNT_JSON }} | base64 --decode > deployer_account.json
          cat deployer_account.json
          address=$(cat deployer_account.json | jq -r .deployment.address)
          echo address=$address
          sncast account import --name testnet --address $address --private-key ${{ secrets.TESTNET_DEPLOYER_KEY }} --type oz -u ${{ secrets.TEST_RPC_09_ADDRESS }}

      - name: Deploy contracts
        id: deploy_contracts
        run: |
          DEPLOYER_ADDRESS=0x19ec96d4aea6fdc6f0b5f393fec3f186aefa8f0b8356f43d07b921ff48aa5da
          # ./utils/deploy_vault.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }}
          # CORE_HASH=$(./utils/declare.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }} -c Core -p perpetuals)
          # echo "core hash $CORE_HASH"

          PERP_ADDRESS=$(sncast --account=testnet deploy \
              --url ${{ secrets.TEST_RPC_09_ADDRESS }} \
              --package perpetuals \
              --contract-name Core \
              --constructor-calldata \
                  ${DEPLOYER_ADDRESS} \
                  0 \
                  0x1 \
                  0x05114ccE0dfb65229284B8EDAb9304a6a53Fe8e80E33b94743993a03dd603A22\
                  1 \
                  604800 \
                  86400 \
                  604800 \
                  4294967295 \
                  86400 \
                  0x4313efb47c1e488ad57e9b66ff11a941310e23307d8fdbc26b2795199bcb57a \
                  0x4313efb47c1e488ad57e9b66ff11a941310e23307d8fdbc26b2795199bcb57a \
                  172800 \
                  0 \
                  12000 \
              | grep "Contract Address:" | awk '{print $NF}') 
          echo "Deployed Core contract at address: $PERP_ADDRESS"
          sleep 30s
          sncast --account=testnet invoke -u ${{ secrets.TEST_RPC_09_ADDRESS }} \
              --contract-address "${PERP_ADDRESS}" \
              --function "register_upgrade_governor" \
              --arguments "${DEPLOYER_ADDRESS}"
          sleep 30s
          sncast --account=testnet invoke -u ${{ secrets.TEST_RPC_09_ADDRESS }} \
              --contract-address "${PERP_ADDRESS}" \
              --function "register_app_role_admin" \
              --arguments "${DEPLOYER_ADDRESS}"
          sleep 30s
          sncast --account=testnet invoke -u ${{ secrets.TEST_RPC_09_ADDRESS }} \
              --contract-address "${PERP_ADDRESS}" \
              --function "register_app_governor" \
              --arguments "${DEPLOYER_ADDRESS}"
          sleep 30s
          sncast --account=testnet invoke -u ${{ secrets.TEST_RPC_09_ADDRESS }} \
              --contract-address "${PERP_ADDRESS}" \
              --function "register_operator" \
              --arguments "${DEPLOYER_ADDRESS}" 
          sleep 30s      
          sncast --account=testnet invoke -u ${{ secrets.TEST_RPC_09_ADDRESS }} \
              --contract-address "${PERP_ADDRESS}" \
              --function "register_upgrade_governor" \
              --arguments "0x030c48A027CCcD0A89262Ac3a0E92973cE206B206160380200FD68FB19B80c88"
          sleep 30s
          sncast --account=testnet invoke -u ${{ secrets.TEST_RPC_09_ADDRESS }} \
              --contract-address "${PERP_ADDRESS}" \
              --function "register_app_role_admin" \
              --arguments "0x030c48A027CCcD0A89262Ac3a0E92973cE206B206160380200FD68FB19B80c88"
          sleep 30s
          sncast --account=testnet invoke -u ${{ secrets.TEST_RPC_09_ADDRESS }} \
              --contract-address "${PERP_ADDRESS}" \
              --function "register_app_governor" \
              --arguments "0x030c48A027CCcD0A89262Ac3a0E92973cE206B206160380200FD68FB19B80c88"
          sleep 30s
          sncast --account=testnet invoke -u ${{ secrets.TEST_RPC_09_ADDRESS }} \
              --contract-address "${PERP_ADDRESS}" \
              --function "register_operator" \
              --arguments "0x030c48A027CCcD0A89262Ac3a0E92973cE206B206160380200FD68FB19B80c88"   
          sleep 30s    

          VAULT_COMPONENT_HASH=$(./utils/declare.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }} -c VaultsManager -p perpetuals)
          echo "vault hash $VAULT_COMPONENT_HASH"
          TRANSFER_COMPONENT_HASH=$(./utils/declare.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }} -c TransferManager -p perpetuals)
          echo "transfer hash $TRANSFER_COMPONENT_HASH"
          WITHDRAWAL_COMPONENT_HASH=$(./utils/declare.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }} -c WithdrawalManager -p perpetuals)
          echo "withdrawal hash $WITHDRAWAL_COMPONENT_HASH"
          LIQUIDATION_COMPONENT_HASH=$(./utils/declare.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }} -c LiquidationManager -p perpetuals)
          echo "liquidation hash $LIQUIDATION_COMPONENT_HASH"
          DELEVERAGE_COMPONENT_HASH=$(./utils/declare.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }} -c DeleverageManager -p perpetuals)
          echo "deleverage hash $DELEVERAGE_COMPONENT_HASH"
          DEPOSIT_COMPONENT_HASH=$(./utils/declare.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }} -c DepositManager -p perpetuals)
          echo "deposit hash $DEPOSIT_COMPONENT_HASH"
          ASSET_MANAGER_COMPONENT_HASH=$(./utils/declare.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }} -c AssetsManager -p perpetuals)
          echo "asset manager hash $ASSET_MANAGER_COMPONENT_HASH"
          FORCED_REQUESTS_COMPONENT_HASH=$(./utils/declare.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }} -c ForcedRequestsManager -p perpetuals)
          echo "forced requests hash $FORCED_REQUESTS_COMPONENT_HASH"
          sleep 30s
          VAULT_CLASS_HASH=$(./utils/declare.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }} -c ProtocolVault -p vault)
          echo "Deployed ProtocolVault contract with class hash: $VAULT_CLASS_HASH"

          # echo add_new_implementation ${CORE_HASH} 1 0
          # echo replace_to             ${CORE_HASH} 1 0




          # sncast --account=testnet invoke -u ${{ secrets.TEST_RPC_09_ADDRESS }} --contract-address 0x05F062C924EcD9f5d4C74c567A28cc5502332fcf21828687EC20581a03F7E1C8  --function add_new_implementation --calldata  ${CORE_HASH} 1 0
          # # sleep 30s
          # sncast --account=testnet invoke -u ${{ secrets.TEST_RPC_09_ADDRESS }} --contract-address 0x05F062C924EcD9f5d4C74c567A28cc5502332fcf21828687EC20581a03F7E1C8  --function replace_to             --calldata  ${CORE_HASH} 1 0
          # # sleep 30s
          ./utils/register_and_activate_external.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }} -c $PERP_ADDRESS -n VAULTS -h ${VAULT_COMPONENT_HASH}
          ./utils/register_and_activate_external.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }} -c $PERP_ADDRESS -n TRANSFERS -h ${TRANSFER_COMPONENT_HASH}
          ./utils/register_and_activate_external.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }} -c $PERP_ADDRESS -n WITHDRAWALS -h ${WITHDRAWAL_COMPONENT_HASH}
          ./utils/register_and_activate_external.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }} -c $PERP_ADDRESS -n LIQUIDATIONS -h ${LIQUIDATION_COMPONENT_HASH}
          ./utils/register_and_activate_external.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }} -c $PERP_ADDRESS -n DELEVERAGES -h ${DELEVERAGE_COMPONENT_HASH}
          ./utils/register_and_activate_external.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }} -c $PERP_ADDRESS -n DEPOSITS -h ${DEPOSIT_COMPONENT_HASH}
          ./utils/register_and_activate_external.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }} -c $PERP_ADDRESS -n ASSETS -h ${ASSET_MANAGER_COMPONENT_HASH}
          ./utils/register_and_activate_external.sh -a testnet -u ${{ secrets.TEST_RPC_09_ADDRESS }} -c $PERP_ADDRESS -n FORCED_REQUESTS -h ${FORCED_REQUESTS_COMPONENT_HASH}
